name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

# DAG defined in TESTING.md §12.4. Many jobs carry `if: false` until
# the phase that activates them lands; remove the guard in that
# phase's commit.

jobs:
  prime:
    name: prime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - uses: taiki-e/install-action@nextest
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo nextest run --no-run --workspace --all-targets --locked

  unit-prop:
    name: unit + property
    needs: prime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - uses: taiki-e/install-action@nextest
      - run: |
          cargo nextest run --workspace --locked \
            -E 'kind(lib) + kind(bin)' \
            --no-tests=pass

  db-integ:
    name: integration (Postgres)
    needs: prime
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: knievel
        options: >-
          --health-cmd "pg_isready -U postgres -d knievel"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 30
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgres://knievel_app:dev@localhost:5432/knievel
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - uses: taiki-e/install-action@nextest
      - name: Provision knievel_app (NOSUPERUSER) for RLS-honest tests
        # Postgres 16.13 rejects ALTER ROLE-self-NOSUPERUSER even
        # for verified superusers (rolsuper=true, is_superuser=on)
        # — see PHASES.md follow-up note below for the diagnostic.
        # Workaround: use `postgres` as the bootstrap superuser
        # and create knievel_app as NOSUPERUSER from the start.
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d knievel <<'EOSQL'
            CREATE ROLE knievel_app WITH NOSUPERUSER CREATEDB LOGIN PASSWORD 'dev';
            GRANT ALL PRIVILEGES ON DATABASE knievel TO knievel_app;
            GRANT ALL PRIVILEGES ON SCHEMA public TO knievel_app;
          EOSQL
      - run: |
          cargo nextest run --workspace --locked \
            -E 'kind(test) & binary(/^integration/)' \
            --no-tests=pass

  api-contract:
    name: api / contract
    needs: prime
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: knievel
        options: >-
          --health-cmd "pg_isready -U postgres -d knievel"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 30
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgres://knievel_app:dev@localhost:5432/knievel
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - uses: taiki-e/install-action@nextest
      - name: Provision knievel_app (NOSUPERUSER) for RLS-honest tests
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d knievel <<'EOSQL'
            CREATE ROLE knievel_app WITH NOSUPERUSER CREATEDB LOGIN PASSWORD 'dev';
            GRANT ALL PRIVILEGES ON DATABASE knievel TO knievel_app;
            GRANT ALL PRIVILEGES ON SCHEMA public TO knievel_app;
          EOSQL
      - run: |
          cargo nextest run --workspace --locked \
            -E 'kind(test) & binary(/^api/)' \
            --no-tests=pass

  xtask-lints:
    name: xtask linters
    needs: prime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - run: cargo xtask lint-migrations
      - run: cargo xtask check-cross-tenant
      - run: cargo xtask test-shape
      - run: cargo xtask check-doc-fences
      - run: cargo xtask check-api-doc
      - run: cargo xtask check-snake-case

  doc-links:
    # Phase 5.6 — intra-repo link checking via lychee. External
    # URLs are checked nightly only (rate-limited APIs make
    # per-PR hostile); intra-repo paths run per PR. See
    # `DOCUMENTATION_PLAN.md` § 11.2.
    name: doc link check (lychee)
    needs: prime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --no-progress
            --include-fragments
            './**/*.md'
          fail: true

  openapi-drift:
    name: openapi drift
    needs: prime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - run: cargo xtask openapi --check

  # Admin-UI gates (Phase 7.3). Each job sets up Node + pnpm
  # via the local node-setup composite (caller checks out
  # first, mirrors gotcha #6). Path-filtering happens at
  # repo scope via `paths-filter` would add cycle complexity;
  # for now every PR runs them — the pnpm-store cache hit
  # makes a no-op run cheap.

  ui-client-drift:
    name: ui client drift
    needs: prime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - uses: ./.github/actions/node-setup
      - run: cargo xtask ui-client --check

  ui-typecheck:
    name: ui typecheck
    needs: prime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/node-setup
      - run: pnpm --dir web/admin typecheck

  ui-lint:
    name: ui lint
    needs: prime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/node-setup
      - run: pnpm --dir web/admin lint
      - run: pnpm --dir web/admin format:check

  ui-test:
    name: ui test
    needs: prime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/node-setup
      - run: pnpm --dir web/admin test --run

  ui-build:
    name: ui build
    needs: prime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/node-setup
      - run: pnpm --dir web/admin build

  helm-lint:
    name: helm lint + kubeconform
    needs: prime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: Install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin kubeconform
      - name: helm lint
        run: helm lint charts/knievel
      # Render with every optional toggle on so kubeconform sees
      # the Ingress + ServiceMonitor branches too. The OCI CRD
      # catalog provides the ServiceMonitor schema since it isn't
      # in the default Kubernetes schema set.
      - name: helm template + kubeconform
        run: |
          helm template knievel charts/knievel \
            --set database.host=aurora.example.com \
            --set database.name=knievel \
            --set database.existingSecret=knievel-db \
            --set ingress.enabled=true \
            --set 'ingress.hosts[0].host=knievel.example.com' \
            --set 'ingress.hosts[0].paths[0].path=/' \
            --set 'ingress.hosts[0].paths[0].pathType=Prefix' \
            --set serviceMonitor.enabled=true \
            > /tmp/knievel-rendered.yaml
          kubeconform -strict -kubernetes-version 1.30.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -summary /tmp/knievel-rendered.yaml

  build-image:
    # Per Phase 4.3: tag-only publish, but PR / main-branch CI
    # still BUILDS the image (no push) to catch Dockerfile rot
    # before a release attempt ships a broken artifact. Single
    # platform here keeps the wall-time small; the multi-arch
    # publish lives in release.yml.
    #
    # Phase 7.11 adds the admin UI bundle. The Node build runs
    # in this job (pnpm-store cached natively via setup-node)
    # BEFORE docker/build-push-action so the build context
    # picks up the populated `web/admin/dist/` for the
    # Dockerfile's `COPY` step.
    name: build container image (no push)
    needs: prime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/node-setup
      - run: pnpm --dir web/admin build
      - uses: docker/setup-buildx-action@v3
      - name: Build (linux/amd64, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  gem-build:
    # Regenerate the knievel-ruby client from this PR's
    # openapi.yaml, build the gem, and run the end-to-end
    # `examples/compose/gem_smoke.rb` against a freshly built
    # knievel docker image. Catches Dockerfile/compose +
    # openapi-generator + wrapper-code regressions pre-merge so
    # `release-ruby-gem.yml` has nothing left to discover at tag
    # time. Mirrors the smoke step previously inlined into the
    # release workflow.
    name: gem build + smoke
    needs: openapi-drift
    runs-on: ubuntu-latest
    steps:
      - name: Mint knievel-pipelines installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.KNIEVEL_PIPELINES_APP_ID }}
          private-key: ${{ secrets.KNIEVEL_PIPELINES_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            knievel
            knievel-ruby

      - name: Checkout knievel (server, for openapi.yaml + config)
        uses: actions/checkout@v4
        with:
          path: knievel

      - name: Checkout knievel-ruby (regeneration target, read-only)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/knievel-ruby
          path: knievel-ruby
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 1
          persist-credentials: false

      - name: Seed/refresh openapi-generator config in knievel-ruby
        run: |
          set -eu
          cp knievel/.github/ruby-client/openapi-generator-config.json \
             knievel-ruby/openapi-generator-config.json
          cp knievel/.github/ruby-client/.openapi-generator-ignore \
             knievel-ruby/.openapi-generator-ignore

      - name: Generate Ruby client from openapi.yaml
        uses: openapi-generators/openapitools-generator-action@v1
        with:
          generator: ruby
          config-file: knievel-ruby/openapi-generator-config.json
          openapi-file: knievel/openapi.yaml
          # CI-only placeholder version — never published, never
          # tagged. Use a non-pre-release semver: a hyphen suffix
          # like `0.0.0-ci` becomes `0.0.0.pre.ci` in gemspec land,
          # which `require "knievel/client"` won't auto-activate
          # because rubygems skips pre-releases by default.
          command-args: >-
            --additional-properties=gemVersion=999.0.0,library=faraday
            --output=knievel-ruby

      - name: Ensure Gemfile.lock is gitignored
        run: |
          set -eu
          touch knievel-ruby/.gitignore
          if ! grep -qx 'Gemfile.lock' knievel-ruby/.gitignore; then
            echo Gemfile.lock >> knievel-ruby/.gitignore
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          working-directory: knievel-ruby
          bundler-cache: false

      - name: Build + load-check gem
        working-directory: knievel-ruby
        run: |
          set -eu
          bundle config set --local frozen false
          bundle install --jobs=4
          rake build
          gem_file=$(ls pkg/*.gem | head -n1)
          test -n "$gem_file"
          unpack_dir=$(mktemp -d)
          gem unpack "$gem_file" --target "$unpack_dir" >/dev/null
          ruby -I "$unpack_dir"/*/lib -e "require 'knievel'; puts Knievel::VERSION"

      # Admin UI bundle must exist before docker compose build —
      # the Dockerfile's last stage `COPY web/admin/dist
      # /var/lib/knievel/admin` is not optional. Mirror Phase 7.11
      # in release.yml.
      #
      # Inline pnpm + node-setup (instead of the
      # `node-setup` composite) because this job checks knievel
      # out into `./knievel/`, but the composite's
      # `cache-dependency-path` is hard-coded to
      # `web/admin/pnpm-lock.yaml` relative to the runner's
      # workspace root.
      - uses: pnpm/action-setup@v4
        with:
          version: "10"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: knievel/web/admin/pnpm-lock.yaml
      - name: pnpm install (web/admin)
        working-directory: knievel/web/admin
        run: pnpm install --frozen-lockfile
      - name: Build admin UI bundle
        working-directory: knievel/web/admin
        run: pnpm build

      - name: Build local knievel docker image
        working-directory: knievel
        env:
          KNIEVEL_IMAGE: knievel:gem-smoke
        run: docker compose -f examples/compose/compose.yaml build knievel

      - name: Boot compose stack (postgres + knievel + seed-demo)
        working-directory: knievel
        env:
          KNIEVEL_IMAGE: knievel:gem-smoke
        run: |
          set -eu
          # seed-demo runs as the distroless `nonroot` UID (65532)
          # and writes the token to ./tmp/knievel-dev-token via a
          # bind mount. The runner workspace owner is `runner`
          # (UID 1001), so we have to pre-create the directory
          # with permissive perms — otherwise the seeder's
          # restart-loop just spins on EACCES.
          mkdir -p tmp
          chmod 0777 tmp
          docker compose -f examples/compose/compose.yaml up -d \
            knievel-postgres knievel knievel-seed

      # If anything between Boot and Smoke trips, dump every
      # service's logs before teardown so the failure shows up in
      # the workflow log instead of vanishing with the runner.
      - name: Dump compose logs on failure
        if: failure()
        working-directory: knievel
        run: docker compose -f examples/compose/compose.yaml logs --no-color || true

      - name: Wait for /healthz + capture seed token
        working-directory: knievel
        run: |
          set -eu
          deadline=$((SECONDS + 90))
          until curl -fsS http://localhost:8080/healthz >/dev/null 2>&1; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "knievel /healthz never came up" >&2
              docker compose -f examples/compose/compose.yaml logs knievel >&2
              exit 1
            fi
            sleep 2
          done
          deadline=$((SECONDS + 30))
          until [ -s tmp/knievel-dev-token ]; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "seed-demo never wrote the token file" >&2
              docker compose -f examples/compose/compose.yaml logs knievel-seed >&2
              exit 1
            fi
            sleep 1
          done
          # seed-demo writes the file as the distroless `nonroot`
          # UID (65532) with mode 0o600. The runner user (1001)
          # cannot read that, and `$(cat ...)` failure inside a
          # variable assignment does not propagate out under
          # `set -eu`, so we'd silently end up with an empty bearer
          # and the gem's first call would 401. Loosen perms with
          # sudo (passwordless on GitHub-hosted runners), then
          # require the captured value to be non-empty.
          sudo chmod 0644 tmp/knievel-dev-token
          token=$(cat tmp/knievel-dev-token)
          test -n "$token"
          echo "KNIEVEL_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Install built gem + run end-to-end smoke
        working-directory: knievel
        run: |
          set -eu
          gem install --no-document ../knievel-ruby/pkg/*.gem
          ruby examples/compose/gem_smoke.rb

      # Always-on log dump so failures in the smoke step (which
      # runs after compose is already up) don't lose server +
      # seeder context. The earlier `if: failure()` step only
      # triggers on failures BEFORE smoke (e.g. boot-time
      # postgres crashes).
      - name: Dump full compose logs (always)
        if: always()
        working-directory: knievel
        run: docker compose -f examples/compose/compose.yaml logs --no-color || true

      - name: Compose teardown (always)
        if: always()
        working-directory: knievel
        run: docker compose -f examples/compose/compose.yaml down -v

  acceptance:
    # ACC-01..30 partitioned across 4 nextest shards per
    # `TESTING.md` § 12.6. The binary runs in-process via
    # `poem::test::TestClient` against an ephemeral Postgres for
    # each test (Phase 4.5), so the docker-image artifact dance
    # described in TESTING.md isn't needed today; the spec's
    # `build-image` predecessor is satisfied by the existing
    # `Dockerfile` + Phase 4.3 image-publish workflows. Going
    # in-process keeps the shard wall-time at ~30 s per shard.
    name: acceptance shard ${{ matrix.shard }}/4
    needs: prime
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: knievel
        options: >-
          --health-cmd "pg_isready -U postgres -d knievel"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 30
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgres://knievel_app:dev@localhost:5432/knievel
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
      - uses: taiki-e/install-action@nextest
      - name: Provision knievel_app (NOSUPERUSER) for RLS-honest tests
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d knievel <<'EOSQL'
            CREATE ROLE knievel_app WITH NOSUPERUSER CREATEDB LOGIN PASSWORD 'dev';
            GRANT ALL PRIVILEGES ON DATABASE knievel TO knievel_app;
            GRANT ALL PRIVILEGES ON SCHEMA public TO knievel_app;
          EOSQL
      - name: Run shard ${{ matrix.shard }}/4
        run: |
          cargo nextest run --workspace --locked \
            -E 'kind(test) & binary(acceptance)' \
            --partition count:${{ matrix.shard }}/4 \
            --no-tests=pass
