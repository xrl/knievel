name: Release Ruby gem

# Regenerates the knievel-ads/knievel-ruby client from the
# committed `openapi.yaml` whenever a `v*` tag is pushed on
# this repo, then commits + tags the matching version on
# knievel-ruby. RubyGems publish is intentionally out of scope
# for this phase — having the regenerated source available at a
# matching tag in knievel-ruby is sufficient for downstream
# consumers via Bundler `git:`/`tag:` references.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release-ruby-gem:
    runs-on: ubuntu-latest
    steps:
      - name: Mint knievel-pipelines installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.KNIEVEL_PIPELINES_APP_ID }}
          private-key: ${{ secrets.KNIEVEL_PIPELINES_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            knievel
            knievel-ruby

      - name: Checkout knievel (server, for openapi.yaml + config)
        uses: actions/checkout@v4
        with:
          path: knievel

      - name: Checkout knievel-ruby (regeneration target)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/knievel-ruby
          path: knievel-ruby
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          persist-credentials: true

      - name: Resolve gem version + target tag
        id: gem_version
        run: |
          set -eu
          echo "gem=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}"   >> "$GITHUB_OUTPUT"

      - name: Seed/refresh openapi-generator config in knievel-ruby
        run: |
          set -eu
          cp knievel/.github/ruby-client/openapi-generator-config.json \
             knievel-ruby/openapi-generator-config.json
          cp knievel/.github/ruby-client/.openapi-generator-ignore \
             knievel-ruby/.openapi-generator-ignore

      - name: Generate Ruby client from openapi.yaml
        uses: openapi-generators/openapitools-generator-action@v1
        with:
          generator: ruby
          config-file: knievel-ruby/openapi-generator-config.json
          openapi-file: knievel/openapi.yaml
          command-args: >-
            --additional-properties=gemVersion=${{ steps.gem_version.outputs.gem }},library=faraday
            --output=knievel-ruby

      - name: Ensure Gemfile.lock is gitignored
        run: |
          set -eu
          touch knievel-ruby/.gitignore
          if ! grep -qx 'Gemfile.lock' knievel-ruby/.gitignore; then
            echo Gemfile.lock >> knievel-ruby/.gitignore
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          working-directory: knievel-ruby
          bundler-cache: false

      - name: Build + smoke-test gem
        working-directory: knievel-ruby
        run: |
          set -eu
          # Generated repo — Gemfile.lock isn't tracked, so do a
          # fresh resolve every run.
          bundle config set --local frozen false
          bundle install --jobs=4
          rake build
          # Verify the packaged gem loads cleanly (catches syntax
          # errors and missing requires that rake build doesn't).
          gem_file=$(ls pkg/*.gem | head -n1)
          test -n "$gem_file"
          unpack_dir=$(mktemp -d)
          gem unpack "$gem_file" --target "$unpack_dir" >/dev/null
          ruby -I "$unpack_dir"/*/lib -e "require 'knievel'; puts Knievel::VERSION"

      # End-to-end gem smoke against a freshly built knievel
      # image + the freshly generated gem. Closes the
      # REQUIREMENTS.md § 8 item 3 promise: "a third party can
      # integrate from the gem alone." If the wrapper code
      # (knievel-ruby `lib/knievel/{client,resources/*}.rb`) is
      # broken against the live server, this fails and we never
      # tag a release. Local equivalent:
      # `docker compose -f examples/compose/compose.yaml up -d
      #  && KNIEVEL_TOKEN=$(cat tmp/knievel-dev-token)
      #     ruby examples/compose/gem_smoke.rb`.

      - name: Build local knievel docker image
        working-directory: knievel
        env:
          KNIEVEL_IMAGE: knievel:gem-smoke
        run: docker compose -f examples/compose/compose.yaml build knievel

      - name: Boot compose stack (postgres + knievel + seed-demo)
        working-directory: knievel
        env:
          KNIEVEL_IMAGE: knievel:gem-smoke
        run: |
          set -eu
          docker compose -f examples/compose/compose.yaml up -d \
            knievel-postgres knievel knievel-seed

      - name: Wait for /healthz + capture seed token
        working-directory: knievel
        run: |
          set -eu
          deadline=$((SECONDS + 90))
          until curl -fsS http://localhost:8080/healthz >/dev/null 2>&1; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "knievel /healthz never came up" >&2
              docker compose -f examples/compose/compose.yaml logs knievel >&2
              exit 1
            fi
            sleep 2
          done
          # seed-demo writes the bearer to ./tmp/knievel-dev-token
          # (mounted from ../../tmp inside the sidecar). Wait for
          # the file with a short bound — the sidecar runs once
          # and exits.
          deadline=$((SECONDS + 30))
          until [ -s tmp/knievel-dev-token ]; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "seed-demo never wrote the token file" >&2
              docker compose -f examples/compose/compose.yaml logs knievel-seed >&2
              exit 1
            fi
            sleep 1
          done
          echo "KNIEVEL_TOKEN=$(cat tmp/knievel-dev-token)" >> "$GITHUB_ENV"

      - name: Install built gem + run end-to-end smoke
        working-directory: knievel
        run: |
          set -eu
          gem install --no-document ../knievel-ruby/pkg/*.gem
          ruby examples/compose/gem_smoke.rb

      - name: Compose teardown (always)
        if: always()
        working-directory: knievel
        run: docker compose -f examples/compose/compose.yaml down -v

      - name: Upload built gem as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: knievel-${{ steps.gem_version.outputs.gem }}.gem
          path: knievel-ruby/pkg/*.gem
          if-no-files-found: error
          retention-days: 30

      - name: Commit + tag knievel-ruby
        working-directory: knievel-ruby
        env:
          TAG: ${{ steps.gem_version.outputs.tag }}
        run: |
          set -eu
          git config user.name  "knievel-pipelines[bot]"
          git config user.email "knievel-pipelines[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No file changes; tagging existing HEAD as $TAG"
          else
            git commit -m "Regenerate from knievel $TAG"
            git push origin HEAD:main
          fi
          # Fail loudly if the tag already exists upstream — re-tagging
          # a published gem version would be a footgun.
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on knievel-ruby; refusing to overwrite." >&2
            exit 1
          fi
          git tag -a "$TAG" -m "Generated from knievel $TAG"
          git push origin "$TAG"
