name: release

on:
  push:
    tags: ['v*']

# One run per tag. Don't cancel in flight — uploading release
# artifacts is expensive and the digest pin would change if a new
# run replaced the old one.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# A tag never lands on `main` without first riding through a PR
# whose `ci.yml` matrix went green (branch protection on `main`
# requires the full per-PR DAG defined in TESTING.md § 12.4).
# Re-running the same gates on the tag commit produced almost-zero
# additional signal — locked deps make it deterministic — at the
# cost of ~25 min of release wall-time. So this workflow trusts
# the PR gate and only does the things that are intrinsically
# tag-specific: build + sign artifacts, regen the gem, cut the
# GitHub Release. If you need to verify the tag commit in
# isolation, run `gh workflow run ci.yml --ref <tag>` manually.

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/knievel

jobs:
  # Per-arch native build → single-platform image push by digest.
  # No QEMU: amd64 builds on `ubuntu-latest`, arm64 builds on
  # `ubuntu-24.04-arm` (GitHub-hosted Linux/aarch64 runner). The
  # Rust binary is compiled NATIVELY by the matched runner and
  # then COPYed into a thin distroless image via
  # `Dockerfile.publish`. Replaces the prior single-runner
  # multi-arch build that compiled the arm64 leg under QEMU
  # emulation — which made the arm64 leg ~10–20× slower than
  # native and dominated release wall-time (~30–45 min vs.
  # ~5–8 min native). The `publish-image-merge` job below
  # combines the two per-arch digests into a manifest list,
  # signs it, and attests provenance.
  publish-image:
    name: publish image (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write       # ghcr push
      id-token: write       # cosign keyless via GitHub OIDC
    steps:
      - uses: actions/checkout@v4

      # Native Rust toolchain (host == target arch — no
      # cross-compilation needed). The composite handles cache.
      - uses: ./.github/actions/rust-setup

      # Admin UI bundle. Built on the runner that's about to
      # build the Docker image so the bundle ends up in the
      # build context.
      - uses: ./.github/actions/node-setup
      - run: pnpm --dir web/admin build

      - name: Build knievel + knievel-cli (native)
        run: cargo build --release --locked --bin knievel --bin knievel-cli

      - name: Stage build context
        # Dockerfile.publish expects:
        #   ./knievel              (server binary)
        #   ./knievel-cli          (CLI binary)
        #   ./web/admin/dist/      (admin SPA bundle)
        # Stage them in a clean dir so we don't ship the entire
        # repo (a few hundred MB) as the Docker build context.
        run: |
          set -eu
          mkdir -p docker-context/web/admin
          cp target/release/knievel       docker-context/knievel
          cp target/release/knievel-cli   docker-context/knievel-cli
          cp -r web/admin/dist            docker-context/web/admin/dist
          cp Dockerfile.publish           docker-context/Dockerfile

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: docker-context
          platforms: ${{ matrix.platform }}
          # `push-by-digest=true` uploads the image without
          # claiming any tag; the merge job below stitches the
          # per-arch digests into a manifest list and tags that.
          # Per-arch GHA cache scopes prevent the two matrix
          # legs from clobbering each other's cache.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=publish-${{ matrix.arch }}
          cache-to: type=gha,scope=publish-${{ matrix.arch }},mode=max

      - name: Export per-arch digest
        # Filename = digest (sha256:<hex> with the prefix
        # stripped). The merge job downloads every artifact and
        # builds an `imagetools create` invocation from the
        # filenames.
        run: |
          set -eu
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-image-merge:
    name: publish image (manifest)
    needs: publish-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # ghcr push (manifest list)
      id-token: write       # cosign keyless
      attestations: write   # provenance attestation
    outputs:
      digest: ${{ steps.merge.outputs.digest }}
      tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # vX.Y.Z (canonical), X.Y, X (major); plus the immutable
          # sha-<short> for compose / Helm digest pinning.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short

      - name: Create manifest list and push
        id: merge
        working-directory: /tmp/digests
        run: |
          set -eu
          # Build `-t <tag1> -t <tag2> ...` from metadata-action's JSON.
          tags=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<<"$DOCKER_METADATA_OUTPUT_JSON")
          # Each digest filename was created from a successful
          # per-arch push, so `<image>@sha256:<file>` resolves.
          refs=$(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)
          # shellcheck disable=SC2086
          docker buildx imagetools create $tags $refs
          # Resolve the merged manifest's digest for cosign + attest.
          version="${{ steps.meta.outputs.version }}"
          digest=$(docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$version" \
            --format '{{json .Manifest}}' | jq -r .digest)
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign manifest list (keyless via GitHub OIDC)
        env:
          DIGEST: ${{ steps.merge.outputs.digest }}
        run: |
          cosign sign --yes \
            ${REGISTRY}/${IMAGE_NAME}@${DIGEST}

      - name: Attest build provenance (manifest list)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.merge.outputs.digest }}
          push-to-registry: true

  build-cli:
    name: build knievel-cli (${{ matrix.target }})
    permissions:
      contents: read
      id-token: write       # cosign keyless on the artifact digest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux musl: statically-linked, runs on any libc.
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true
          # Apple silicon only — Intel Macs are sunsetting and the
          # canonical x86_64 macOS runner label `macos-15-intel`
          # will EOL in Aug 2027 anyway. Users on Intel Macs can
          # build from source or run the linux/amd64 image under
          # Docker Desktop.
          - target: aarch64-apple-darwin
            runner: macos-14
            cross: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (linux-musl only)
        if: matrix.cross
        run: cargo install cross --locked --version 0.2.5

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --bin knievel-cli --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --bin knievel-cli --target ${{ matrix.target }}

      - name: Strip + package
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${TARGET}/release/knievel-cli"
          # macOS strip behaves a little differently from GNU strip;
          # both are fine with default flags here.
          strip "${BIN}" || true
          STAGING="knievel-cli-${VERSION}-${TARGET}"
          mkdir -p "dist/${STAGING}"
          cp "${BIN}" "dist/${STAGING}/knievel-cli"
          cp README.md LICENSE "dist/${STAGING}/" 2>/dev/null || true
          tar -czf "dist/${STAGING}.tar.gz" -C dist "${STAGING}"
          # Per-artifact sha256 sidecar.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${STAGING}.tar.gz" | sed "s| dist/| |" > "dist/${STAGING}.tar.gz.sha256"
          else
            shasum -a 256 "dist/${STAGING}.tar.gz" | sed "s| dist/| |" > "dist/${STAGING}.tar.gz.sha256"
          fi
          ls -la dist/

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the tarball blob (keyless)
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          STAGING="knievel-cli-${VERSION}-${TARGET}"
          cosign sign-blob --yes \
            --bundle "dist/${STAGING}.tar.gz.cosign.bundle" \
            "dist/${STAGING}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: dist/knievel-cli-*.*
          if-no-files-found: error
          retention-days: 7

  github-release:
    name: github release
    needs: [publish-image-merge, build-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cli-*
          merge-multiple: true

      - name: Build aggregate checksums.txt
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          # One newline-delimited file with `<sha256>  <filename>`
          # for every uploaded tarball — matches goreleaser's
          # convention so consumers can `sha256sum -c checksums.txt`.
          rm -f checksums.txt
          for f in knievel-cli-*.tar.gz; do
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "${f}" >> checksums.txt
            else
              shasum -a 256 "${f}" >> checksums.txt
            fi
          done
          ls -la

      - name: Compose release notes
        env:
          VERSION: ${{ github.ref_name }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ needs.publish-image-merge.outputs.digest }}
        shell: bash
        run: |
          cat > RELEASE_NOTES.md <<EOF
          ## ${VERSION}

          ### Container image

          - Tag:    \`${IMAGE}:${VERSION}\`
          - Digest: \`${DIGEST}\`
          - Verify: \`cosign verify ${IMAGE}@${DIGEST} \\
              --certificate-identity-regexp 'https://github.com/${{ github.repository }}/.github/workflows/release.yml.*' \\
              --certificate-oidc-issuer https://token.actions.githubusercontent.com\`

          ### \`knievel-cli\` install

          \`\`\`bash
          # Linux x86_64
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${VERSION}/knievel-cli-${VERSION}-x86_64-unknown-linux-musl.tar.gz \\
            | tar -xz --strip-components=1 -C \$HOME/.local/bin knievel-cli-${VERSION}-x86_64-unknown-linux-musl/knievel-cli

          # Linux arm64
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${VERSION}/knievel-cli-${VERSION}-aarch64-unknown-linux-musl.tar.gz \\
            | tar -xz --strip-components=1 -C \$HOME/.local/bin knievel-cli-${VERSION}-aarch64-unknown-linux-musl/knievel-cli

          # Apple silicon
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${VERSION}/knievel-cli-${VERSION}-aarch64-apple-darwin.tar.gz \\
            | tar -xz --strip-components=1 -C \$HOME/.local/bin knievel-cli-${VERSION}-aarch64-apple-darwin/knievel-cli
          \`\`\`

          Verify each tarball:

          \`\`\`bash
          cosign verify-blob \\
            --bundle knievel-cli-${VERSION}-<target>.tar.gz.cosign.bundle \\
            --certificate-identity-regexp 'https://github.com/${{ github.repository }}/.github/workflows/release.yml.*' \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \\
            knievel-cli-${VERSION}-<target>.tar.gz
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          files: |
            dist/knievel-cli-*.tar.gz
            dist/knievel-cli-*.tar.gz.sha256
            dist/knievel-cli-*.tar.gz.cosign.bundle
            dist/checksums.txt

  publish-helm:
    name: publish helm chart
    needs: github-release
    runs-on: ubuntu-latest
    if: false   # Phase 4.4 lands the chart; 5.8 wires the publish.
    steps:
      - uses: actions/checkout@v4
      - run: echo "TODO — Phase 5.8 — helm package + chart index push"

  release-ruby-gem:
    # Regenerate the knievel-ads/knievel-ruby client from the
    # tagged `openapi.yaml`, commit + tag knievel-ruby with the
    # same `v*`. The downstream RubyGems publish lives in
    # knievel-ruby's `publish-rubygems.yml`, triggered by the
    # tag we push here. (App-token-pushed tags DO trigger
    # downstream workflows, unlike pushes via the default
    # GITHUB_TOKEN — that's what makes the chain work.)
    #
    # Smoke-test rationale: the `gem-build` job in ci.yml
    # already regenerated this gem on the merging PR, built it,
    # and ran `examples/compose/gem_smoke.rb` against a freshly
    # built knievel image. If the PR's `gem-build` was green,
    # this regen against the same `openapi.yaml` is a tautology.
    # Re-running the smoke at tag time would only catch
    # toolchain-flake regressions in the openapi-generator
    # action — not worth the wall-time on every release.
    name: release ruby gem
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Mint knievel-pipelines installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.KNIEVEL_PIPELINES_APP_ID }}
          private-key: ${{ secrets.KNIEVEL_PIPELINES_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            knievel
            knievel-ruby

      - name: Checkout knievel (server, for openapi.yaml + config)
        uses: actions/checkout@v4
        with:
          path: knievel

      - name: Checkout knievel-ruby (regeneration target)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/knievel-ruby
          path: knievel-ruby
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          persist-credentials: true

      - name: Resolve gem version + target tag
        id: gem_version
        run: |
          set -eu
          echo "gem=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}"   >> "$GITHUB_OUTPUT"

      - name: Seed/refresh openapi-generator config in knievel-ruby
        run: |
          set -eu
          cp knievel/.github/ruby-client/openapi-generator-config.json \
             knievel-ruby/openapi-generator-config.json
          cp knievel/.github/ruby-client/.openapi-generator-ignore \
             knievel-ruby/.openapi-generator-ignore

      - name: Generate Ruby client from openapi.yaml
        uses: openapi-generators/openapitools-generator-action@v1
        with:
          generator: ruby
          config-file: knievel-ruby/openapi-generator-config.json
          openapi-file: knievel/openapi.yaml
          command-args: >-
            --additional-properties=gemVersion=${{ steps.gem_version.outputs.gem }},library=faraday
            --output=knievel-ruby

      - name: Ensure Gemfile.lock is gitignored
        run: |
          set -eu
          touch knievel-ruby/.gitignore
          if ! grep -qx 'Gemfile.lock' knievel-ruby/.gitignore; then
            echo Gemfile.lock >> knievel-ruby/.gitignore
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          working-directory: knievel-ruby
          bundler-cache: false

      - name: Build + load-check gem
        working-directory: knievel-ruby
        run: |
          set -eu
          # Generated repo — Gemfile.lock isn't tracked, so do a
          # fresh resolve every run.
          bundle config set --local frozen false
          bundle install --jobs=4
          rake build
          # Verify the packaged gem loads cleanly (catches syntax
          # errors and missing requires that rake build doesn't).
          gem_file=$(ls pkg/*.gem | head -n1)
          test -n "$gem_file"
          unpack_dir=$(mktemp -d)
          gem unpack "$gem_file" --target "$unpack_dir" >/dev/null
          ruby -I "$unpack_dir"/*/lib -e "require 'knievel'; puts Knievel::VERSION"

      - name: Upload built gem as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: knievel-${{ steps.gem_version.outputs.gem }}.gem
          path: knievel-ruby/pkg/*.gem
          if-no-files-found: error
          retention-days: 30

      - name: Commit + tag knievel-ruby
        working-directory: knievel-ruby
        env:
          TAG: ${{ steps.gem_version.outputs.tag }}
        run: |
          set -eu
          git config user.name  "knievel-pipelines[bot]"
          git config user.email "knievel-pipelines[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No file changes; tagging existing HEAD as $TAG"
          else
            git commit -m "Regenerate from knievel $TAG"
            git push origin HEAD:main
          fi
          # Fail loudly if the tag already exists upstream — re-tagging
          # a published gem version would be a footgun.
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on knievel-ruby; refusing to overwrite." >&2
            exit 1
          fi
          git tag -a "$TAG" -m "Generated from knievel $TAG"
          git push origin "$TAG"
          # knievel-ruby's `publish-rubygems.yml` picks up from
          # here: tag push triggers it, it builds the gem fresh
          # from the tagged source, and runs `gem push` with
          # `secrets.RUBYGEMS_ORG_API_KEY` (scoped to that repo).
