name: 'rust-setup'
description: >-
  Install the Rust toolchain pinned in rust-toolchain.toml and
  restore the shared cargo cache. The CALLER must run
  `actions/checkout@v4` before invoking this composite — local
  composite actions (`./.github/actions/...`) can't be located
  until the repo is on disk.

inputs:
  shared-key:
    description: 'rust-cache shared-key (defaults to knievel-ci so all jobs share)'
    required: false
    default: 'knievel-ci'
  components:
    description: 'Comma-separated extra rustup components'
    required: false
    default: 'rustfmt,clippy'

runs:
  using: 'composite'
  steps:
    - uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: '1.94'
        components: ${{ inputs.components }}

    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ inputs.shared-key }}
        cache-on-failure: 'true'

