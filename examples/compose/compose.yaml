# Knievel reference compose stack — Phase 4.1.
#
# `docker compose up` brings up a Postgres and a knievel server in
# under a minute. The image either pulls from `ghcr.io/knievel-ads/knievel`
# (default) or builds the local source tree (set the `KNIEVEL_BUILD`
# env var to anything to flip the switch). Phase 4.3 publishes the
# image; until then most contributors run with `KNIEVEL_BUILD=1`.
#
# Layout mirrors the canonical RX example in
# `MIGRATION_RX.md` "Local Development for RX Engineers" — same
# service names, same volume names, same healthcheck shape — so
# a contributor can read the migration guide and the reference
# stack interchangeably.
#
# `knievel-seed` is the seed-demo sidecar slot. Phase 4.2 lands
# the actual `knievel-cli seed-demo` invocation; today it logs a
# placeholder and exits 0 so `docker compose up` doesn't wedge
# waiting on it.

name: knievel

services:
  knievel-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: knievel_app
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: knievel
    volumes:
      - knievel-pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knievel_app -d knievel"]
      interval: 2s
      retries: 30
    ports:
      - "127.0.0.1:5432:5432"

  knievel:
    # Default points at the published ghcr image. Phase 4.3
    # publishes images on semver tags only (no main-branch
    # pushes) — until the first release, contributors must
    # build locally via `KNIEVEL_BUILD=1 docker compose build`.
    # `KNIEVEL_IMAGE` overrides the default; production
    # deployments should pin a digest:
    #   KNIEVEL_IMAGE=ghcr.io/knievel-ads/knievel@sha256:... docker compose up
    image: ${KNIEVEL_IMAGE:-ghcr.io/knievel-ads/knievel:latest}
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      knievel-postgres:
        condition: service_healthy
    environment:
      KNIEVEL_CONFIG: /etc/knievel/config.yaml
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
    volumes:
      - ./config.yaml:/etc/knievel/config.yaml:ro
    ports:
      - "8080:8080"
    healthcheck:
      # Distroless has no shell, but `knievel` itself ships
      # `/healthz`. Use Postgres's host-based check via wget
      # over the published port from the postgres container —
      # but that's circular. Simpler: run the healthcheck via
      # the knievel-postgres image which has psql + curl-style
      # tools. For v0 we exec the healthcheck inside a separate
      # service when needed; the docker-compose service-level
      # healthcheck below relies on `start_period` and the
      # depender's connection retry.
      test: ["NONE"]
      interval: 5s
      retries: 30

  knievel-seed:
    # Bootstrap fixture data on first compose-up. Reuses the same
    # image as the server (multi-binary Cargo package — `knievel-cli`
    # ships in /usr/local/bin alongside `knievel`). Connects to
    # Postgres directly to bypass the auth chicken-and-egg, then
    # writes the bearer to ./tmp/knievel-dev-token on the host.
    # Idempotent — re-running compose up after data exists is a
    # no-op apart from a hash-rotation if --token is supplied.
    image: ${KNIEVEL_IMAGE:-ghcr.io/knievel-ads/knievel:latest}
    depends_on:
      knievel-postgres:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/knievel-cli"]
    command:
      - seed-demo
      - --org-external-id=demo-org
      - --project-external-id=demo-project
      - --token=kvl_dev_org_compose_dev
      - --write-token-to=/out/knievel-dev-token
    environment:
      DATABASE_URL: postgres://knievel_app:dev@knievel-postgres:5432/knievel?sslmode=disable
    volumes:
      - ../../tmp:/out
    restart: "no"

volumes:
  knievel-pgdata:
