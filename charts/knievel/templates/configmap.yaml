apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "knievel.fullname" . }}-config
  labels:
    {{- include "knievel.labels" . | nindent 4 }}
data:
  config.yaml: |
    api:
      bind_addr: {{ .Values.api.bindAddr | quote }}
      {{- if .Values.api.publicBaseUrl }}
      public_base_url: {{ .Values.api.publicBaseUrl | quote }}
      {{- end }}

    database:
      url: {{ include "knievel.databaseUrl" . | quote }}
      max_connections: {{ .Values.database.maxConnections }}
      auto_migrate: {{ .Values.database.autoMigrate }}

    decisions:
      force_overrides_enabled: {{ .Values.decisions.forceOverridesEnabled }}

    events:
      retention_days: {{ .Values.events.retentionDays }}
      flush_interval_ms: {{ .Values.events.flushIntervalMs }}
      flush_batch_size: {{ .Values.events.flushBatchSize }}
      channel_capacity: {{ .Values.events.channelCapacity }}

    logging:
      level: {{ .Values.logging.level | quote }}
      format: {{ .Values.logging.format | quote }}
      decisions_sample_rate: {{ .Values.logging.decisionsSampleRate }}

    {{- if .Values.sentry.enabled }}
    sentry:
      dsn: ${KNIEVEL_SENTRY_DSN}
      environment: {{ default .Release.Namespace .Values.sentry.environment | quote }}
      traces_sample_rate: {{ .Values.sentry.tracesSampleRate }}
      release: {{ default (default .Chart.AppVersion .Values.image.tag) .Values.sentry.release | quote }}
    {{- end }}

    {{- if .Values.otel.enabled }}
    otel:
      endpoint: {{ .Values.otel.endpoint | quote }}
      service_name: {{ .Values.otel.serviceName | quote }}
      {{- with .Values.otel.resourceAttributes }}
      resource_attributes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
