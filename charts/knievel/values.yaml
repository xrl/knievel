# Default values for knievel.
# Spec ref: REQUIREMENTS.md § 8.1 — every block here corresponds to
# a section of the rendered /etc/knievel/config.yaml.

image:
  repository: ghcr.io/knievel-ads/knievel
  # When empty, the chart uses .Chart.AppVersion. Override to pin
  # a specific tag (`vX.Y.Z`) or an immutable digest
  # (`sha256:...`); the rendered Deployment uses the digest form
  # if `tag` starts with `sha256:`.
  tag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

nameOverride: ""
fullnameOverride: ""

replicaCount: 2

# Pod-level annotations and labels (e.g. workload-identity hints).
podAnnotations: {}
podLabels: {}

# Resource budget per REQUIREMENTS.md § 8 ("right-sized for v0").
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 1Gi

# Aurora cluster writer endpoint.
database:
  host: ""
  port: 5432
  name: ""
  schema: knievel
  sslMode: require
  # Secret holding `username` + `password` keys (override via
  # `userKey` / `passwordKey`). Required.
  existingSecret: ""
  userKey: username
  passwordKey: password
  maxConnections: 8
  autoMigrate: true
  # When true (the default), a missing or unusable database is a
  # fatal boot error: the process exits 1 so kubelet enters
  # CrashLoopBackOff. Set to false only in development clusters
  # where you want the pod to start without a database (all
  # project-scoped endpoints will 503 until the DB is reachable).
  required: true
  # Exponential-backoff retry settings for the initial Postgres
  # connection. The server attempts `attempts` times before
  # treating the failure as fatal (subject to `required` above).
  connectRetry:
    attempts: 5
    initialBackoffMs: 1000
    maxBackoffMs: 16000

events:
  retentionDays: 30
  flushIntervalMs: 1000
  flushBatchSize: 5000
  channelCapacity: 10000

decisions:
  forceOverridesEnabled: false

hmac:
  # Secret holding the default-key material for new projects.
  existingSecret: ""
  key: hmac-default

sentry:
  enabled: false
  existingSecret: ""
  dsnKey: dsn
  environment: ""
  tracesSampleRate: 0.0
  release: ""

otel:
  enabled: false
  endpoint: ""
  serviceName: knievel
  resourceAttributes: {}

logging:
  level: info
  format: json
  decisionsSampleRate: 0.01

api:
  publicBaseUrl: ""
  bindAddr: "0.0.0.0:8080"

# Admin UI runtime config. Surfaced verbatim to the SPA at
# GET /admin/config.json so one image works across envs. See
# AUTH.md "Keycloak Setup — Human Admin UI (PKCE)" and the
# `admin_ui` block in config.example.yaml.
#
# When both `oidc.issuer` and `oidc.clientId` are empty (the
# default), the chart skips the admin_ui block in config.yaml
# entirely and the SPA falls through to the paste-a-token form.
adminUi:
  oidc:
    # OIDC issuer URL (e.g. https://identity.example.com/realms/foo).
    issuer: ""
    # Public PKCE client ID. No client secret — PKCE replaces it.
    clientId: ""
    # Scopes requested by the SPA. `knievel` triggers the Keycloak
    # claim mapper that emits the `knievel` JWT claim.
    scopes:
      - openid
      - profile
      - knievel
    # When true, the SPA hides the paste-a-token fallback so
    # SSO/MFA/audit policy can't be sidestepped.
    requireOidc: false

# API-side JWT validation policies. Each entry is a trusted OIDC
# issuer; the first whose `iss` claim matches the incoming token is
# used. JWKS is auto-discovered from
# `{issuer}/.well-known/openid-configuration` when `jwksUrl` is left
# empty. With an empty list, the API only accepts opaque (`kvl_…`)
# tokens — the JWT path is disabled.
#
# Example (Keycloak human admin UI):
#   auth:
#     jwt:
#       issuers:
#         - issuer: "https://identity.example.com/realms/foo"
#           audience: "knievel"
#           algorithms: ["RS256"]
#           claim: "knievel"
auth:
  jwt:
    issuers: []

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts: []
    # - host: knievel.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  tls: []

service:
  type: ClusterIP
  port: 80

serviceAccount:
  create: true
  name: ""
  annotations: {}

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

# Topology / scheduling. Leave empty for single-zone defaults; the
# chart README walks through the zone-spread recipe.
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Probes for the standard /healthz + /readyz endpoints.
probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
  readiness:
    path: /readyz
    initialDelaySeconds: 2
    periodSeconds: 5
    timeoutSeconds: 1
    failureThreshold: 3
