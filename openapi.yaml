components:
  schemas:
    Ad:
      type: object
      title: Ad
      required:
      - id
      - flight_id
      - weight
      - is_active
      - etag
      - created_at
      - updated_at
      properties:
        id:
          type: integer
          format: int64
        external_id:
          type: string
        flight_id:
          type: integer
          format: int64
        creative_id:
          type: integer
          format: int64
        ad_library_item_id:
          type: string
        weight:
          type: integer
          format: int32
        is_active:
          type: boolean
        etag:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
    AdList:
      type: object
      title: AdList
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Ad'
        next_cursor:
          type: string
    Advertiser:
      type: object
      title: Advertiser
      required:
      - id
      - name
      - is_active
      - etag
      - created_at
      - updated_at
      properties:
        id:
          type: integer
          format: int64
        external_id:
          type: string
        name:
          type: string
        is_active:
          type: boolean
        etag:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
    AdvertiserList:
      type: object
      title: AdvertiserList
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Advertiser'
        next_cursor:
          type: string
    AuthBlock:
      type: object
      title: AuthBlock
      required:
      - modes
      - issuers
      properties:
        modes:
          type: array
          items:
            type: string
        issuers:
          type: array
          items:
            $ref: '#/components/schemas/IssuerSummary'
    Campaign:
      type: object
      title: Campaign
      required:
      - id
      - advertiser_id
      - name
      - is_active
      - etag
      - created_at
      - updated_at
      properties:
        id:
          type: integer
          format: int64
        external_id:
          type: string
        advertiser_id:
          type: integer
          format: int64
        name:
          type: string
        is_active:
          type: boolean
        etag:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
    CampaignList:
      type: object
      title: CampaignList
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Campaign'
        next_cursor:
          type: string
    CreateAdRequest:
      type: object
      title: CreateAdRequest
      required:
      - flight_id
      - creative_id
      properties:
        external_id:
          type: string
        flight_id:
          type: integer
          format: int64
        creative_id:
          type: integer
          format: int64
        weight:
          type: integer
          format: int32
        is_active:
          type: boolean
    CreateAdvertiserRequest:
      type: object
      title: CreateAdvertiserRequest
      required:
      - name
      properties:
        external_id:
          type: string
        name:
          type: string
        is_active:
          type: boolean
    CreateCampaignRequest:
      type: object
      title: CreateCampaignRequest
      required:
      - advertiser_id
      - name
      properties:
        external_id:
          type: string
        advertiser_id:
          type: integer
          format: int64
        name:
          type: string
        is_active:
          type: boolean
    CreateCreativeRequest:
      type: object
      title: CreateCreativeRequest
      required:
      - advertiser_id
      - kind
      properties:
        external_id:
          type: string
        advertiser_id:
          type: integer
          format: int64
        name:
          type: string
        kind:
          type: string
          description: '"image", "html", or "native".'
        image_url:
          type: string
        width:
          type: integer
          format: int32
        height:
          type: integer
          format: int32
        alt:
          type: string
        body:
          type: string
        template_id:
          type: integer
          format: int64
        values: {}
        click_through_url:
          type: string
        is_active:
          type: boolean
    CreateCreativeTemplateRequest:
      type: object
      title: CreateCreativeTemplateRequest
      required:
      - name
      - schema
      properties:
        external_id:
          type: string
        name:
          type: string
        schema:
          description: Arbitrary JSON Schema document; not parsed by knievel.
    CreateFlightRequest:
      type: object
      title: CreateFlightRequest
      required:
      - campaign_id
      - name
      - priority_id
      - ad_types
      properties:
        external_id:
          type: string
        campaign_id:
          type: integer
          format: int64
        name:
          type: string
        priority_id:
          type: integer
          format: int64
        start_date:
          type: string
        end_date:
          type: string
        site_ids:
          type: array
          items:
            type: integer
            format: int64
        zone_ids:
          type: array
          items:
            type: integer
            format: int64
        ad_types:
          type: array
          items:
            type: integer
            format: int64
        is_active:
          type: boolean
    CreateProjectRequest:
      type: object
      title: CreateProjectRequest
      required:
      - name
      properties:
        external_id:
          type: string
          description: Caller-assigned external id, unique within the org.
        name:
          type: string
    CreateTokenRequest:
      type: object
      title: CreateTokenRequest
      required:
      - name
      - scope
      - role
      properties:
        name:
          type: string
        scope:
          type: string
          description: '"org" or "project".'
        project_id:
          type: string
          description: Required iff `scope == "project"`.
        role:
          type: string
          description: '`reader`, `editor`, `admin`, `org-admin`, `org-owner`.'
        expires_at:
          type: string
        ip_allowlist:
          type: array
          items:
            type: string
    CreateTokenResponse:
      type: object
      title: CreateTokenResponse
      required:
      - id
      - secret
      - name
      - scope
      - role
      - created_at
      properties:
        id:
          type: string
        secret:
          type: string
          description: |-
            Plaintext secret. **Returned exactly once** — knievel stores
            only the argon2id hash. Lost secrets cannot be recovered.
        name:
          type: string
        scope:
          type: string
        role:
          type: string
        created_at:
          type: string
    Creative:
      type: object
      title: Creative
      required:
      - id
      - advertiser_id
      - kind
      - is_active
      - etag
      - created_at
      - updated_at
      properties:
        id:
          type: integer
          format: int64
        external_id:
          type: string
        advertiser_id:
          type: integer
          format: int64
        name:
          type: string
        kind:
          type: string
        image_url:
          type: string
        width:
          type: integer
          format: int32
        height:
          type: integer
          format: int32
        alt:
          type: string
        body:
          type: string
        template_id:
          type: integer
          format: int64
        values: {}
        click_through_url:
          type: string
        is_active:
          type: boolean
        etag:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
    CreativeList:
      type: object
      title: CreativeList
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Creative'
