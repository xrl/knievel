  /v1/projects/{project_id}/advertisers:batchUpsert:
    post:
      tags:
      - Advertisers
      summary: |-
        `POST /v1/projects/:project_id/advertisers:batchUpsert` —
        bulk by `externalId`. Single Postgres transaction; per
        `API.md` "Write contract" any per-row failure rolls back
        the whole batch with `details[]` listing every offending
        row. On success: 200 with the upserted rows in input order.
      parameters:
      - name: project_id
        schema:
          type: string
        in: path
        required: true
        deprecated: false
        explode: true
      requestBody:
        content:
          application/json; charset=utf-8:
            schema:
              $ref: '#/components/schemas/BatchUpsertAdvertisersRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/BatchUpsertAdvertisersResult'
        '403':
          description: ''
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: |-
            Per `API.md` "Write contract": one or more rows failed
            validation, the entire transaction rolled back, no partial
            state leaked into the snapshot.
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/BatchErrorEnvelope'
        '500':
          description: ''
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - BearerAuth: []
      operationId: batchUpsertAdvertisers
