  /v1/orgs/{org_id}/tokens:
    post:
      tags:
      - Tokens
      summary: |-
        Mint an opaque token. Returns the plaintext secret exactly
        once. Min role: org-admin.
      parameters:
      - name: org_id
        schema:
          type: string
        in: path
        required: true
        deprecated: false
        explode: true
      requestBody:
        content:
          application/json; charset=utf-8:
            schema:
