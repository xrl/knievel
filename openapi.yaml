openapi: 3.0.0
info:
  title: knievel
  version: 0.1.12
servers:
- url: http://localhost:8080
  description: Local development default; override via your client's host configuration for production.
tags:
- name: AdLibrary
  description: Cross-project ad library (read-only inventory view).
- name: Ads
  description: Ad CRUD + `:batchUpsert`.
- name: Advertisers
  description: Advertiser CRUD + `:batchUpsert`.
- name: Auth
  description: |-
    Auth handshake — `/v1/whoami` and friends. Validates a
    bearer (opaque or JWT) and echoes the principal back so
    clients can confirm the credential before proceeding.
- name: Campaigns
  description: Campaign CRUD + `:batchUpsert`.
- name: CreativeTemplates
  description: Creative template CRUD + JSON-schema validation surface.
- name: Creatives
  description: Creative CRUD + `:batchUpsert`.
- name: Decisions
  description: Hot-path decisioning endpoints.
- name: Explain
  description: Decision-explanation / preview endpoints.
- name: Flights
  description: Flight CRUD + `:batchUpsert` (pacing, scheduling, demand).
- name: Orgs
  description: |-
    Org and project lifecycle (single resource module covers
    both since project lookups are scoped through the org).
- name: Sites
  description: Site CRUD + `:batchUpsert`.
- name: System
  description: Liveness, readiness, and build/version metadata.
- name: Taxonomy
  description: Taxonomy categories + project-scoped seeding.
- name: Tokens
  description: API token mint, list, and revoke.
- name: Zones
  description: Zone CRUD + `:batchUpsert`.
paths:
  /healthz:
    get:
      tags:
      - System
      summary: Liveness — k8s liveness probe key.
      responses:
        '200':
          description: ''
          content:
            text/plain; charset=utf-8:
              schema:
                type: string
      operationId: healthz
  /readyz:
    get:
      tags:
      - System
      summary: |-
        Readiness — only 200 when knievel can serve. Per
        `REQUIREMENTS.md` § 10.6, the full check has four
        criteria; today only the DB-reachability one is real.
      responses:
        '200':
          description: Process up + DB reachable (or no DB configured).
          content:
            text/plain; charset=utf-8:
              schema:
                type: string
        '503':
          description: DB writer unreachable; pods should be removed from the LB.
          content:
            text/plain; charset=utf-8:
              schema:
                type: string
      operationId: readyz
  /version:
    get:
      tags:
      - System
      summary: Build metadata + effective auth policy.
      responses:
        '200':
          description: ''
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/VersionResponse'
      operationId: version
  /v1/whoami:
    get:
      tags:
      - Auth
      responses:
        '200':
          description: ''
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/WhoamiResponse'
      security:
      - BearerAuth: []
      operationId: whoami
  /v1/orgs/{org_id}/projects:
    post:
      tags:
      - Orgs
      summary: |-
        Create a project under an org. Honors `Idempotency-Key`
        (24 h replay window per `API.md` "Idempotency"); `409
        idempotency_conflict` if the same key is reused with a
        different body. Returns `409 external_id_conflict` if the
        `externalId` is already taken in this org.
      parameters:
      - name: org_id
        schema:
          type: string
        in: path
        required: true
        deprecated: false
        explode: true
      - name: Idempotency-Key
        schema:
          type: string
        in: header
        required: false
        deprecated: false
        explode: true
      requestBody:
        content:
          application/json; charset=utf-8:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
        required: true
      responses:
        '201':
          description: |-
            Fresh create, OR an idempotency replay. The
            `Idempotent-Replay: true` header lets the caller
            distinguish a cached return from a fresh one
            (`API.md` "Idempotency"). Absent on fresh executions.
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
          headers:
            IDEMPOTENT-REPLAY:
              deprecated: false
              schema:
                type: string
        '403':
          description: Org mismatch between the principal and the path.
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: |-
            `externalId` already taken in this org, OR `Idempotency-Key`
            reused with a different body.
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: ''
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - BearerAuth: []
      operationId: createProject
  /v1/orgs/{org_id}/projects/{project_id}:
    get:
      tags:
      - Orgs
      summary: Read a single project by id (path).
      parameters:
      - name: org_id
        schema:
          type: string
        in: path
        required: true
        deprecated: false
        explode: true
      - name: project_id
        schema:
