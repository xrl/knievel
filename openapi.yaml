      type: object
      title: BatchErrorBody
      description: |-
        Body of a `batch_partial_failure` envelope. Mirrors
        `API.md` "Write contract" exactly so a future code-gen
        consumer can deserialize this in any language.
      required:
      - code
      - message
      - details
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/BatchErrorDetail'
    BatchErrorDetail:
      type: object
      title: BatchErrorDetail
      description: |-
        One per-row failure within a `:batchUpsert`. `index` is the
        position of the offending row in the request array (0-based).
        `code` is one of: `fk_not_found`, `external_id_conflict`,
        `validation_failed`, `unique_violation`, `if_match_mismatch`.
      required:
      - index
      - code
      - message
      properties:
        index:
          type: integer
          format: int32
        field:
          type: string
        code:
          type: string
        message:
          type: string
    BatchErrorEnvelope:
      type: object
      title: BatchErrorEnvelope
      required:
      - error
      properties:
        error:
          $ref: '#/components/schemas/BatchErrorBody'
