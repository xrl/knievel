        '500':
          description: ''
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - BearerAuth: []
      operationId: createToken
    get:
      tags:
      - Tokens
      summary: |-
        List tokens (metadata only; secrets never leave the mint
        response). Min role: org-admin.
      parameters:
      - name: org_id
        schema:
          type: string
        in: path
        required: true
        deprecated: false
        explode: true
      responses:
        '200':
          description: ''
