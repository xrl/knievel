components:
  schemas:
    Ad:
      type: object
      title: Ad
      required:
      - id
      - flight_id
      - weight
      - is_active
      - etag
      - created_at
      - updated_at
      properties:
        id:
          type: integer
          format: int64
        external_id:
          type: string
        flight_id:
          type: integer
          format: int64
        creative_id:
          type: integer
          format: int64
        ad_library_item_id:
          type: string
        weight:
          type: integer
          format: int32
        is_active:
          type: boolean
        etag:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
    AdLibraryItem:
      type: object
      title: AdLibraryItem
      required:
      - id
      - name
      - kind
      - is_active
      - etag
      - created_at
      - updated_at
      properties:
        id:
          type: string
        external_id:
          type: string
        name:
          type: string
        kind:
          type: string
        image_url:
          type: string
        width:
          type: integer
          format: int32
        height:
          type: integer
          format: int32
        alt:
          type: string
        body:
          type: string
        template_id:
          type: integer
          format: int64
        values: {}
        click_through_url:
          type: string
        is_active:
          type: boolean
        etag:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
    AdLibraryItemList:
      type: object
      title: AdLibraryItemList
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdLibraryItem'
        next_cursor:
          type: string
    AdList:
      type: object
      title: AdList
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Ad'
        next_cursor:
          type: string
    AdType:
      type: object
      title: AdType
      required:
      - id
      - name
      - created_at
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        width:
          type: integer
          format: int32
        height:
          type: integer
          format: int32
        created_at:
          type: string
    AdTypeList:
      type: object
      title: AdTypeList
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdType'
        next_cursor:
          type: string
    Advertiser:
      type: object
      title: Advertiser
      required:
      - id
      - name
      - is_active
      - etag
      - created_at
      - updated_at
      properties:
        id:
          type: integer
          format: int64
        external_id:
          type: string
        name:
          type: string
        is_active:
          type: boolean
        etag:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
    AdvertiserList:
      type: object
      title: AdvertiserList
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Advertiser'
        next_cursor:
          type: string
    AuthBlock:
      type: object
      title: AuthBlock
      required:
      - modes
      - issuers
      properties:
        modes:
          type: array
          items:
            type: string
        issuers:
          type: array
