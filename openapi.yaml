            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/TokenListResponse'
        '403':
          description: ''
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: ''
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - BearerAuth: []
      operationId: listTokens
  /v1/orgs/{org_id}/tokens/{token_id}:
    delete:
      tags:
      - Tokens
      summary: |-
        Revoke a token (soft delete via `revoked_at`). The auth
        path filters revoked rows at the next request. Min role:
        org-admin.
      parameters:
      - name: org_id
        schema:
          type: string
        in: path
        required: true
        deprecated: false
        explode: true
      - name: token_id
        schema:
          type: string
        in: path
        required: true
        deprecated: false
        explode: true
      responses:
        '204':
          description: ''
        '403':
          description: ''
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: ''
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: ''
          content:
            application/json; charset=utf-8:
              schema:
