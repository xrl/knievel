    VersionResponse:
      type: object
      title: VersionResponse
      description: |-
        Build metadata + effective auth policy. Per `API.md` § 5 and
        `AUTH.md` "Effective-policy visibility." `auth.modes` lists
        the enabled credential types (`opaque`, `jwt`); `auth.issuers`
        summarizes each configured JWT issuer with its audience,
        algorithms, claim source, and JWKS URL. Secrets are never
        returned.
      required:
      - knievel
      - schema
      - git_sha
      - build_timestamp
      - auth
      properties:
        knievel:
          type: string
        schema:
          type: string
        git_sha:
          type: string
        build_timestamp:
          type: string
        auth:
          $ref: '#/components/schemas/AuthBlock'
    WhoamiResponse:
      type: object
      title: WhoamiResponse
      required:
      - scope
      - org_id
      - role
      - token_type
      - actor_id
      properties:
        scope:
          type: string
          description: '`org` or `project`.'
        org_id:
          type: string
        project_id:
          type: string
          description: Present only when `scope == "project"`.
        role:
          type: string
          description: One of `org-owner`, `org-admin`, `admin`, `editor`, `reader`.
        token_type:
          type: string
          description: '`opaque` for `kvl_*` bearers; `jwt` for OIDC bearers.'
        actor_id:
          type: string
          description: Opaque actor identifier; matches `audit_log.actor`.
