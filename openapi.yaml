        required: true
      responses:
        '201':
          description: ''
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/CreateTokenResponse'
        '400':
          description: ''
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: ''
          content:
            application/json; charset=utf-8:
              schema:
