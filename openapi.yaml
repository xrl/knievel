openapi: 3.0.0
info:
  title: knievel
  version: 0.1.0
servers: []
tags: []
paths:
  /healthz:
    get:
      summary: Liveness — k8s liveness probe key.
      responses:
        '200':
          description: ''
          content:
            text/plain; charset=utf-8:
              schema:
                type: string
      operationId: healthz
  /readyz:
    get:
      summary: |-
        Readiness — only 200 when knievel can serve. Per
        `REQUIREMENTS.md` § 10.6, the full check has four
        criteria; today only the DB-reachability one is real.
      responses:
        '200':
          description: Process up + DB reachable (or no DB configured).
          content:
            text/plain; charset=utf-8:
              schema:
                type: string
        '503':
          description: DB writer unreachable; pods should be removed from the LB.
          content:
            text/plain; charset=utf-8:
              schema:
                type: string
      operationId: readyz
  /version:
    get:
      summary: Build metadata + effective auth policy.
      responses:
        '200':
          description: ''
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/VersionResponse'
      operationId: version
  /v1/orgs/{org_id}/projects:
    post:
      summary: |-
        Create a project under an org. Honors `Idempotency-Key`
        (24 h replay window per `API.md` "Idempotency"); `409
        idempotency_conflict` if the same key is reused with a
        different body. Returns `409 external_id_conflict` if the
        `externalId` is already taken in this org.
      parameters:
      - name: org_id
        schema:
          type: string
        in: path
        required: true
        deprecated: false
        explode: true
      - name: idempotency_key
        schema:
          type: string
        in: header
        required: false
        deprecated: false
        explode: true
      requestBody:
        content:
          application/json; charset=utf-8:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
        required: true
      responses:
        '201':
          description: Fresh create.
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '201':
          description: |-
            Idempotency replay — same `Idempotency-Key`, same body. The
            `Idempotent-Replay: true` header lets the caller distinguish
            the cached response from a fresh one (`API.md`
            "Idempotency").
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
          headers:
            IDEMPOTENT-REPLAY:
              required: true
              deprecated: false
              schema:
                type: string
        '403':
          description: Org mismatch between the principal and the path.
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: |-
            `externalId` already taken in this org, OR `Idempotency-Key`
            reused with a different body.
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: ''
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - BearerAuth: []
      operationId: createProject
  /v1/orgs/{org_id}/projects/{project_id}:
    get:
      summary: Read a single project by id (path).
      parameters:
      - name: org_id
        schema:
          type: string
        in: path
        required: true
        deprecated: false
        explode: true
      - name: project_id
        schema:
          type: string
        in: path
        required: true
        deprecated: false
        explode: true
      responses:
        '200':
          description: ''
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '403':
          description: ''
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: ''
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: ''
          content:
            application/json; charset=utf-8:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      security:
      - BearerAuth: []
      operationId: getProject
components:
  schemas:
    AuthBlock:
      type: object
      title: AuthBlock
      required:
      - modes
      - issuers
      properties:
        modes:
          type: array
          items:
            type: string
        issuers:
          type: array
          items:
            $ref: '#/components/schemas/IssuerSummary'
    CreateProjectRequest:
      type: object
      title: CreateProjectRequest
      required:
      - name
      properties:
        external_id:
          type: string
          description: Caller-assigned external id, unique within the org.
        name:
          type: string
    ErrorBody:
      type: object
      title: ErrorBody
      required:
      - code
      - message
      properties:
        code:
          type: string
        message:
          type: string
    ErrorEnvelope:
      type: object
      title: ErrorEnvelope
      required:
      - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'
    IssuerSummary:
      type: object
      title: IssuerSummary
      required:
      - issuer
      - audience
      properties:
        issuer:
          type: string
        audience:
          type: string
    ProjectResponse:
      type: object
      title: ProjectResponse
      required:
      - id
      - name
      - is_active
      - etag
      - created_at
      - updated_at
      properties:
        id:
          type: string
        external_id:
          type: string
        name:
          type: string
        is_active:
          type: boolean
        etag:
          type: string
        created_at:
          type: string
          description: RFC 3339 UTC, formatted by Postgres via `to_jsonb`.
        updated_at:
          type: string
    VersionResponse:
      type: object
      title: VersionResponse
      description: |-
        Build metadata + effective auth policy. Per `API.md` § 5 and
        `AUTH.md` "Effective-policy visibility." `auth.modes` and
        `auth.issuers` are empty until Phase 3.16 lands real auth.
      required:
      - knievel
      - schema
      - git_sha
      - build_timestamp
      - auth
      properties:
        knievel:
          type: string
        schema:
          type: string
        git_sha:
          type: string
        build_timestamp:
          type: string
        auth:
          $ref: '#/components/schemas/AuthBlock'
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
