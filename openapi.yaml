      - zone_ids
      - ad_types
      - is_active
      - etag
      - created_at
      - updated_at
      properties:
        id:
          type: integer
          format: int64
        external_id:
          type: string
        campaign_id:
          type: integer
          format: int64
        name:
          type: string
        priority_id:
          type: integer
          format: int64
