[workspace]
resolver = "2"
members = ["xtask"]

[workspace.package]
edition    = "2021"
license    = "MIT"
repository = "https://github.com/xrl/knievel"
homepage   = "https://github.com/xrl/knievel"
version    = "0.1.0"

# Shared dep versions live here so workspace members agree.
# Members opt in via `dep = { workspace = true }`. Per-task work
# adds entries as needed; PHASES.md tracks what landed when.
[workspace.dependencies]
anyhow      = "1"
thiserror   = "2"
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
serde_yaml  = "0.9"
tokio       = { version = "1", features = ["full"] }
tracing     = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

[package]
name        = "knievel"
description = "Fearlessly fast ad delivery that steals the show"
edition.workspace    = true
license.workspace    = true
repository.workspace = true
homepage.workspace   = true
version.workspace    = true

[dependencies]
# Real deps land per-task in subsequent Phase 1/2 commits.
